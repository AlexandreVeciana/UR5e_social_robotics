# ============================================================
# UR5e Pick & Place Pose Sequence
#
# Pose convention:
#   target_xyz and target_rpy are expressed in TABLE / RoboDK frame
#   (intuitive workspace frame).
#
# Internal conversion (handled by node):
#
#   x_base = -x_table
#   y_base = -y_table
#   z_base =  z_table
#   yaw_base = yaw_table + 180 deg
#
# Units:
#   target_xyz : millimeters
#   target_rpy : degrees
#   seed_joints: degrees
#
# ============================================================
common:
  execute: true
  group_name: ur_manipulator
  # IK reference frame (tool frame)
  ik_link: tool0
  # ik_link: 2fg7_tcp   # Uncomment if using OnRobot 2FG7 TCP
  pose_input_frame: table
  max_velocity: 0.1
  max_acceleration: 0.1
  print_joints: true

steps:

  - name: home_start
    target_xyz: [0, -400, 500]
    target_rpy: [90, 0, 0]
    seed_from_joint_states: false
    seed_joints: [30, -130, 140, -180, -30, 180]
    sleep_after: 1.0

  - name: approach_pick
    target_xyz: [-300, -400, 200]
    target_rpy: [180, 0, 0]
    seed_from_joint_states: true
    sleep_after: 1.0

  - name: pick
    target_xyz: [-300, -400, 100]
    target_rpy: [180, 0, 0]
    seed_from_joint_states: true
    sleep_after: 1.0

  - name: retreat_pick
    target_xyz: [-300, -400, 200]
    target_rpy: [180, 0, 0]
    seed_from_joint_states: true
    sleep_after: 1.0


  - name: home_middle
    target_xyz: [0, -400, 500]
    target_rpy: [90, 0, 0]
    seed_from_joint_states: false
    seed_joints: [30, -130, 140, -180, -30, 180]
    sleep_after: 1.0

  - name: approach_place
    target_xyz: [300, 400, 200]
    target_rpy: [180, 0, 0]
    seed_from_joint_states: true
    sleep_after: 1.0

  - name: place
    target_xyz: [300, 400, 100]
    target_rpy: [180, 0, 0]
    seed_from_joint_states: true
    sleep_after: 1.0

  - name: retreat_place
    target_xyz: [300, 400, 200]
    target_rpy: [180, 0, 0]
    seed_from_joint_states: true
    sleep_after: 1.0

  - name: home_end
    target_xyz: [0, 400, 500]
    target_rpy: [90, 0, 0]
    seed_from_joint_states: false
    seed_joints: [30, -130, 140, -180, -30, 180]
    sleep_after: 1.0