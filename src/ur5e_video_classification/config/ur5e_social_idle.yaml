# ur5e_social_idle.yaml
# Compact resting pose, slightly lower than home.
# Triggered by NoAction to tuck the arm out of the way.

sequence:
  - step_name: idle
    joints_deg: [-90.0, -90.0, -90.0, -180.0, -90.0, 90.0]
    max_velocity_scale: 0.10
    max_acceleration_scale: 0.10
    execute: true
    print_joints: true