# ur5e_social_point_down.yaml
# Point Down: arm moves to a mid-forward position, then tool tilts to
# point directly downward. RPY [0, 90, 0] rotates the tool Z-axis to -Z.

sequence:
  - step_name: point_prepare
    target_xyz_mm: [420.0, -100.0, 620.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [10.0, -80.0, 95.0, -105.0, -90.0, 10.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.14
    max_acceleration_scale: 0.14
    print_joints: true

  - step_name: point_down
    target_xyz_mm: [420.0, -100.0, 380.0]
    target_rpy_deg: [0.0, 90.0, 0.0]
    seed_joints_deg: [10.0, -55.0, 100.0, -135.0, -90.0, 100.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.10
    max_acceleration_scale: 0.10
    sleep_after: 1.0
    print_joints: true

  - step_name: point_retract
    target_xyz_mm: [420.0, -100.0, 620.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [10.0, -80.0, 95.0, -105.0, -90.0, 10.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.12
    max_acceleration_scale: 0.12
    print_joints: false

  - step_name: home
    target_xyz_mm: [350.0, 0.0, 500.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: false
