# ur5e_social_wave.yaml
# Raises the arm then sweeps laterally twice to produce a waving motion.
# Seed joints are adjusted for each lateral position to guide the IK solver.
sequence:
  - step_name: wave_home
    joints_deg: [-90.0, -90.0, -90.0, -180.0, -90.0, 90.0]
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    execute: true
    print_joints: true

  - step_name: wave_raise
    joints_deg: [0.0, -45.0, -140.0, -90.0, -90.0, 90.0]
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    execute: true
    print_joints: false

  - step_name: wave_right_1
    joints_deg: [0.0, -45.0, -140.0, -60.0, -90.0, 90.0]
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    execute: true
    print_joints: false

  - step_name: wave_left_1
    joints_deg: [0.0, -45.0, -140.0, -110.0, -90.0, 90.0]
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    execute: true
    print_joints: false

  - step_name: wave_right_2
    joints_deg: [0.0, -45.0, -140.0, -60.0, -90.0, 90.0]
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    execute: true
    print_joints: false

  - step_name: wave_left_2
    joints_deg: [0.0, -45.0, -140.0, -110.0, -90.0, 90.0]
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    execute: true
    print_joints: false

  - step_name: wave_right_3
    joints_deg: [0.0, -45.0, -140.0, -60.0, -90.0, 90.0]
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    execute: true
    print_joints: false

  - step_name: wave_return
    joints_deg: [-90.0, -90.0, -90.0, -180.0, -90.0, 90.0]
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    execute: true
    print_joints: false