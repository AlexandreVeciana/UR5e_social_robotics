# ur5e_social_wave.yaml
# Raises the arm then sweeps laterally twice to produce a waving motion.
# Seed joints are adjusted for each lateral position to guide the IK solver.

sequence:
  - step_name: wave_raise
    target_xyz_mm: [380.0, -150.0, 830.0]
    target_rpy_deg: [90.0, 0.0, 60.0]
    seed_joints_deg: [15.0, -115.0, 75.0, -50.0, -90.0, 15.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: true

  - step_name: wave_right_1
    target_xyz_mm: [380.0, -300.0, 800.0]
    target_rpy_deg: [90.0, 0.0, 30.0]
    seed_joints_deg: [30.0, -115.0, 80.0, -55.0, -90.0, 30.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    print_joints: false

  - step_name: wave_left_1
    target_xyz_mm: [380.0, 0.0, 800.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -115.0, 80.0, -55.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    print_joints: false

  - step_name: wave_right_2
    target_xyz_mm: [380.0, -300.0, 800.0]
    target_rpy_deg: [90.0, 0.0, 30.0]
    seed_joints_deg: [30.0, -115.0, 80.0, -55.0, -90.0, 30.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    print_joints: false

  - step_name: wave_left_2
    target_xyz_mm: [380.0, 0.0, 800.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -115.0, 80.0, -55.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.20
    max_acceleration_scale: 0.20
    print_joints: false

  - step_name: home
    target_xyz_mm: [350.0, 0.0, 500.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: false
