# ur5e_social_cross.yaml
# Cross gesture: arm sweeps diagonally high-left to low-right,
# then high-right to low-left, tracing an X in front of the robot.

sequence:
  - step_name: cross_top_left
    target_xyz_mm: [430.0, 200.0, 820.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [-20.0, -115.0, 80.0, -55.0, -90.0, -20.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: true

  - step_name: cross_bottom_right
    target_xyz_mm: [430.0, -200.0, 400.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [20.0, -65.0, 105.0, -130.0, -90.0, 20.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.22
    max_acceleration_scale: 0.22
    print_joints: false

  - step_name: cross_top_right
    target_xyz_mm: [430.0, -200.0, 820.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [20.0, -115.0, 80.0, -55.0, -90.0, 20.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.22
    max_acceleration_scale: 0.22
    print_joints: false

  - step_name: cross_bottom_left
    target_xyz_mm: [430.0, 200.0, 400.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [-20.0, -65.0, 105.0, -130.0, -90.0, -20.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.22
    max_acceleration_scale: 0.22
    print_joints: false

  - step_name: home
    target_xyz_mm: [350.0, 0.0, 500.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: false
