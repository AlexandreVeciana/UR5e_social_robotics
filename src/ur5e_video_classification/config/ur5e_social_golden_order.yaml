# ur5e_social_golden_order.yaml
# Golden Order gesture: arm raised in a solemn, upright salute,
# held for two seconds, then a slight bow before returning home.

sequence:
  - step_name: golden_raise
    target_xyz_mm: [380.0, -80.0, 850.0]
    target_rpy_deg: [0.0, -15.0, 90.0]
    seed_joints_deg: [8.0, -125.0, 80.0, -45.0, -90.0, 8.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.12
    max_acceleration_scale: 0.12
    print_joints: true

  - step_name: golden_hold
    target_xyz_mm: [380.0, -80.0, 850.0]
    target_rpy_deg: [0.0, -15.0, 90.0]
    seed_joints_deg: [8.0, -125.0, 80.0, -45.0, -90.0, 8.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.05
    max_acceleration_scale: 0.05
    sleep_after: 2.0
    print_joints: false

  - step_name: golden_bow
    target_xyz_mm: [480.0, -50.0, 580.0]
    target_rpy_deg: [90.0, 20.0, 90.0]
    seed_joints_deg: [5.0, -75.0, 100.0, -115.0, -90.0, 5.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.10
    max_acceleration_scale: 0.10
    sleep_after: 0.8
    print_joints: false

  - step_name: home
    target_xyz_mm: [350.0, 0.0, 500.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: false
