# ur5e_social_handshake.yaml
# Extends the arm forward at handshake height, holds briefly, then retracts.
# End-effector orientation: tool pointing forward, palm-down (rpy 90 0 90).

sequence:
  - step_name: handshake_home
    joints_deg: [-90.0, -90.0, -90.0, -180.0, -90.0, 90.0]
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    execute: true
    print_joints: true

  - step_name: handshake_ready
    joints_deg: [-90.0, -90.0, -120.0, -145.0, -90.0, 90.0]
    max_velocity_scale: 0.12
    max_acceleration_scale: 0.12
    execute: true
    print_joints: false

  - step_name: handshake_extend_1
    joints_deg: [-90.0, -90.0, -120.0, -165.0, -90.0, 90.0]
    max_velocity_scale: 0.08
    max_acceleration_scale: 0.08
    execute: true
    print_joints: false

  - step_name: handshake_retract_1
    joints_deg: [-90.0, -90.0, -120.0, -145.0, -90.0, 90.0]
    max_velocity_scale: 0.08
    max_acceleration_scale: 0.08
    execute: true
    print_joints: false

  - step_name: handshake_extend_2
    joints_deg: [-90.0, -90.0, -120.0, -165.0, -90.0, 90.0]
    max_velocity_scale: 0.08
    max_acceleration_scale: 0.08
    execute: true
    print_joints: false

  - step_name: handshake_retract_2
    joints_deg: [-90.0, -90.0, -120.0, -145.0, -90.0, 90.0]
    max_velocity_scale: 0.08
    max_acceleration_scale: 0.08
    execute: true
    print_joints: false

  - step_name: handshake_extend_3
    joints_deg: [-90.0, -90.0, -120.0, -165.0, -90.0, 90.0]
    max_velocity_scale: 0.08
    max_acceleration_scale: 0.08
    execute: true
    print_joints: false

  - step_name: handshake_retract_3
    joints_deg: [-90.0, -90.0, -120.0, -145.0, -90.0, 90.0]
    max_velocity_scale: 0.08
    max_acceleration_scale: 0.08
    execute: true
    print_joints: false

  - step_name: handshake_return
    joints_deg: [-90.0, -90.0, -90.0, -180.0, -90.0, 90.0]
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    execute: true
    print_joints: false