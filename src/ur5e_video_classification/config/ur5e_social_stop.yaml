# ur5e_social_stop.yaml
# Raises the arm with the palm facing outward (toward the person) as a STOP signal.
# RPY [0, 0, 90]: tool Z pointing up, palm faces forward along the table X axis.

sequence:
  - step_name: stop_raise
    target_xyz_mm: [420.0, -120.0, 860.0]
    target_rpy_deg: [0.0, 0.0, 90.0]
    seed_joints_deg: [12.0, -125.0, 90.0, -55.0, -90.0, 12.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.18
    max_acceleration_scale: 0.18
    print_joints: true

  - step_name: stop_hold
    target_xyz_mm: [420.0, -120.0, 860.0]
    target_rpy_deg: [0.0, 0.0, 90.0]
    seed_joints_deg: [12.0, -125.0, 90.0, -55.0, -90.0, 12.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.05
    max_acceleration_scale: 0.05
    sleep_after: 1.5
    print_joints: false

  - step_name: home
    target_xyz_mm: [350.0, 0.0, 500.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: false
