# ur5e_social_bow.yaml
# Simulates a bow: end-effector dips forward and down, holds, then rises.
# The pitch component in RPY tilts the tool downward during the bow.

sequence:
  - step_name: bow_prepare
    target_xyz_mm: [450.0, 0.0, 600.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -80.0, 95.0, -105.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.14
    max_acceleration_scale: 0.14
    print_joints: true

  - step_name: bow_down
    target_xyz_mm: [530.0, 0.0, 330.0]
    target_rpy_deg: [90.0, 30.0, 90.0]
    seed_joints_deg: [0.0, -55.0, 115.0, -150.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.10
    max_acceleration_scale: 0.10
    sleep_after: 1.2
    print_joints: true

  - step_name: bow_up
    target_xyz_mm: [450.0, 0.0, 600.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -80.0, 95.0, -105.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.10
    max_acceleration_scale: 0.10
    print_joints: false

  - step_name: home
    target_xyz_mm: [350.0, 0.0, 500.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: false
