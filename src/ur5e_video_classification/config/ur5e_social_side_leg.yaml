# ur5e_social_side_leg.yaml
# Side Leg: arm sweeps upward from centre and extends fully to the robot's
# right side at mid-height — mirroring a side-leg raise posture.

sequence:
  - step_name: side_leg_prepare
    target_xyz_mm: [380.0, 0.0, 650.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.14
    max_acceleration_scale: 0.14
    print_joints: true

  - step_name: side_leg_mid
    target_xyz_mm: [380.0, -200.0, 680.0]
    target_rpy_deg: [90.0, 0.0, 60.0]
    seed_joints_deg: [20.0, -90.0, 90.0, -90.0, -90.0, 20.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.16
    max_acceleration_scale: 0.16
    print_joints: false

  - step_name: side_leg_full
    target_xyz_mm: [340.0, -400.0, 620.0]
    target_rpy_deg: [90.0, 0.0, 30.0]
    seed_joints_deg: [38.0, -90.0, 88.0, -88.0, -90.0, 38.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.14
    max_acceleration_scale: 0.14
    sleep_after: 0.8
    print_joints: true

  - step_name: side_leg_return
    target_xyz_mm: [380.0, 0.0, 650.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.14
    max_acceleration_scale: 0.14
    print_joints: false

  - step_name: home
    target_xyz_mm: [350.0, 0.0, 500.0]
    target_rpy_deg: [90.0, 0.0, 90.0]
    seed_joints_deg: [0.0, -90.0, 90.0, -90.0, -90.0, 0.0]
    reference_frame: table
    execute: true
    max_velocity_scale: 0.15
    max_acceleration_scale: 0.15
    print_joints: false
